<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZERODA - 오프라인</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #1a73e8, #34a853);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    text-align: center;
    padding: 20px;
  }
  .container { max-width: 400px; }
  .icon { font-size: 80px; margin-bottom: 20px; }
  h1 { font-size: 24px; margin-bottom: 12px; }
  p { font-size: 16px; opacity: 0.9; line-height: 1.5; margin-bottom: 24px; }
  .retry-btn {
    display: inline-block;
    padding: 14px 32px;
    background: #fff;
    color: #1a73e8;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
  }
  .retry-btn:active { background: #e8e8e8; }
</style>
</head>
<body>
<div class="container">
  <div class="icon">📡</div>
  <h1>인터넷 연결 없음</h1>
  <p>ZERODA 기사앱을 사용하려면<br>인터넷 연결이 필요합니다.<br>Wi-Fi 또는 데이터를 확인해 주세요.</p>
  <a class="retry-btn" href="/" onclick="location.reload(); return false;">다시 시도</a>
</div>
</body>
</html>
