# /etc/nginx/sites-available/zeroda
# ZERODA Reflex 앱 — zeroda.co.kr 직결 (Streamlit 교체)
#
# 설치 순서:
#   1. 기존 Streamlit nginx 설정 백업
#      cp /etc/nginx/sites-available/zeroda /etc/nginx/sites-available/zeroda.bak.streamlit
#   2. 이 파일로 교체
#      cp nginx-reflex.conf /etc/nginx/sites-available/zeroda
#   3. Streamlit 서비스 중지
#      systemctl stop zeroda && systemctl disable zeroda
#   4. nginx 재시작
#      nginx -t && systemctl restart nginx

# ═══════════════════════════════════════
#  업스트림 정의
# ═══════════════════════════════════════
upstream reflex_backend {
    server 127.0.0.1:8000;
    keepalive 32;
}

upstream reflex_frontend {
    server 127.0.0.1:3000;
    keepalive 16;
}

# ═══════════════════════════════════════
#  HTTP → HTTPS 리다이렉트
# ═══════════════════════════════════════
server {
    listen 80;
    server_name zeroda.co.kr www.zeroda.co.kr;
    return 301 https://zeroda.co.kr$request_uri;
}

# ═══════════════════════════════════════
#  HTTPS 서버 — zeroda.co.kr → Reflex
# ═══════════════════════════════════════
server {
    listen 443 ssl http2;
    server_name zeroda.co.kr www.zeroda.co.kr;

    # ── SSL 인증서 (Let's Encrypt) ──
    ssl_certificate     /etc/letsencrypt/live/zeroda.co.kr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/zeroda.co.kr/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;

    # ── 보안 헤더 ──
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── 업로드 크기 제한 ──
    client_max_body_size 20M;

    # ── Reflex 정적 파일 (프로덕션 빌드 후) ──
    location /_next/static/ {
        alias /opt/zeroda-reflex/zeroda_reflex/.web/_next/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ── PWA 정적 파일 (기존 유지) ──
    location /static/ {
        alias /opt/zeroda-reflex/zeroda_reflex/.web/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # ── Reflex WebSocket ──
    location /_event {
        proxy_pass http://reflex_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ── Reflex 백엔드 API ──
    location /api/ {
        proxy_pass http://reflex_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Reflex 업로드 ──
    location /_upload {
        proxy_pass http://reflex_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        client_max_body_size 20M;
    }

    # ── 발급 문서 정적 파일 서빙 (문서서비스) ──
    location /uploads/ {
        alias /opt/zeroda-platform/uploads/;
        expires 1d;
        add_header Cache-Control "private, no-cache";
    }

    # ── Reflex 프론트엔드 (기본) ──
    location / {
        proxy_pass http://reflex_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ── 에러 페이지 ──
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }

    # ── 로그 ──
    access_log /var/log/nginx/zeroda-access.log;
    error_log  /var/log/nginx/zeroda-error.log;
}
